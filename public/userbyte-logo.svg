<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Chip icon -->
  <rect x="2" y="8" width="32" height="32" rx="8" fill="url(#lg)"/>
  <!-- Circuit pins top -->
  <line x1="10" y1="8" x2="10" y2="3" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="8" x2="18" y2="3" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="8" x2="26" y2="3" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Circuit pins bottom -->
  <line x1="10" y1="40" x2="10" y2="45" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="40" x2="18" y2="45" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="40" x2="26" y2="45" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Circuit pins right -->
  <line x1="34" y1="16" x2="39" y2="16" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="24" x2="39" y2="24" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="32" x2="39" y2="32" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <!-- UB text inside chip -->
  <text x="18" y="29" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="white">UB</text>

  <!-- Company name -->
  <text x="50" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#f1f5f9">User</text>
  <text x="90" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#22d3ee">Byte</text>
  <text x="50" y="38" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#64748b" letter-spacing="3">SOLUTION</text>

  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
</svg>
